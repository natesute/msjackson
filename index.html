<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>strudel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main">
    <div id="editors-container">
      <div id="editor" class="editor-panel"></div>
    </div>
    <canvas id="viz"></canvas>
  </div>
  <div id="statusline">
    <span id="mode">STOPPED</span>
    <span class="sep">|</span>
    <span id="info">col:1</span>
    <span class="sep">|</span>
    <span id="dirty-count"></span>
    <span class="right">
      <span class="hint">C-enter eval</span>
      <span class="hint">C-. stop</span>
      <span class="hint">C-s save</span>
      <span class="hint">C-o open</span>
      <span class="hint">C-n new</span>
      <span class="hint">C-m mute</span>
      <span class="hint">C-w wrap</span>
      <span class="hint">C-1/2/3 cols</span>
    </span>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
